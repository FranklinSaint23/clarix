name: Keep Render Alive

on:
  schedule:
    - cron: '*/12 * * * *'   # toutes les 12 min — Render dort après 15 min d'inactivité
  workflow_dispatch:           # déclenchement manuel possible

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping CLARIX
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://clarix-dpn3.onrender.com/up)
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Render a répondu $STATUS"
            exit 1
          fi
          echo "✅ CLARIX est en ligne"
